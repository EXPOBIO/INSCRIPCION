<!DOCTYPE html>
<html lang="es">
<head>
    <base target="top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>EXPOBIO 2026 Inscripción</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Iconito de la barra -->
    <link rel="icon" type="image/png" sizes="32x32"
        href="https://files.catbox.moe/zftv8w.png">
    <link rel="shortcut icon"
        href="https://files.catbox.moe/zftv8w.png">
</head>

<body>
    <div class="carta">
        <div class="box-titulo">
            <img class="Escudo-UNSAAC" src="Logaso.png" alt="Escudo UNSAAC">
        </div>
    </div>
    
    <div class="carta">
        <div class="box-pagos">
            <div class="box-pagos-logo">
                <h1>EXPOBIO 2026</h1>
                <h2>Seleccione su tipo de inscripción</h2>
            </div>
            <div class="box-pagos-ayuda">
                <button class="btn-ayuda-pago" onclick="window.top.location.href='guia.html'"> 
                    Ayuda con el pago
                </button>
            </div>
            <div class="box-estudiante-grupo10">
                <div class="estudiante">
                    <button class="btn-estudiante" onclick="window.top.location.href='datosEstudiante.html'">
                        <h1>Estudiante</h1>
                        <p>Inscripción individual, universal, con pago</p>
                    </button>
                </div>
                <div class="grupo10">
                    <button class="btn-grupo10" onclick="window.top.location.href='datosGrupo.html'">
                        <h1>Grupo de 10</h1>
                        <p>Inscripción grupal, con descuento, un solo váucher</p>
                    </button>
                </div>
            </div>
            <div class="box-egresado">
                <button class="btn-egresado" onclick="window.top.location.href='datosEgresado.html'">
                    <h1>Egresado / Profesional</h1>
                    <p>Inscripción de no universitario, con pago</p>
                </button>
            </div>
            <div class="box-consultas">
                <button class="btn-consultas" onclick="window.top.location.href='https://expobio.github.io/CONSULTAS/'">
                    <h1>Consultas</h1>
                    <p>Si tienes dudas sobre el estado de tu inscripción</p>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
